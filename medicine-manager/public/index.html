<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>慢性病用药管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>*{margin:0;padding:0;box-sizing:border-box}:root{--p:#4f46e5;--pl:#eef2ff;--d:#ef4444;--dl:#fef2f2;--w:#f59e0b;--wl:#fffbeb;--s:#10b981;--sl:#ecfdf5;--t:#1e293b;--t2:#64748b;--bg:#f1f5f9;--c:#fff;--b:#e2e8f0;--r:12px}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,PingFang SC,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding-bottom:80px;line-height:1.5}
.nb{background:var(--c);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100}
.ni{max-width:800px;margin:0 auto;display:flex;align-items:center;padding:0 16px;height:56px;gap:8px}
.lg{font-weight:700;font-size:1.1rem}.nv{display:flex;gap:2px;margin-left:auto}
.nb-b{padding:8px 12px;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;border:none;background:0 0;color:var(--t2);white-space:nowrap;transition:.15s}
.nb-b:hover{background:var(--bg)}.nb-b.on{background:var(--pl);color:var(--p);font-weight:600}
.mw{max-width:800px;margin:0 auto;padding:16px}.pg{display:none}.pg.on{display:block}
.cd{background:var(--c);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.08);padding:20px;margin-bottom:16px}.cd-t{font-size:1rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.al{padding:14px 16px;border-radius:var(--r);margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.al-r{background:var(--dl);border:1px solid #fecaca}.al-w{background:var(--wl);border:1px solid #fde68a}
.st{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.st-c{background:var(--c);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.08);padding:16px;text-align:center}
.st-n{font-size:1.8rem;font-weight:700;color:var(--p)}.st-n.dg{color:var(--d)}.st-l{font-size:.78rem;color:var(--t2);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:.9rem;font-weight:500;border:1px solid var(--b);cursor:pointer;transition:.15s;background:var(--c);color:var(--t);font-family:inherit}
.btn:active{transform:scale(.97)}.btn-p{background:var(--p);color:#fff;border-color:var(--p)}
.btn-sm{padding:6px 14px;font-size:.82rem}.btn-xs{padding:4px 10px;font-size:.75rem;border-radius:6px}.btn-gh{background:0 0;border:0;color:var(--t2)}
.fg{margin-bottom:14px}.fg-l{display:block;font-size:.82rem;font-weight:600;color:var(--t2);margin-bottom:5px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:480px){.fr{grid-template-columns:1fr}}
input,select,textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--b);font-size:.9rem;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
textarea{resize:vertical;min-height:60px}
.pi{padding:16px 0;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px}.pi:last-child{border-bottom:none}
.pa{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.pf{flex:1;min-width:0}.pn{font-weight:600;font-size:.95rem}.ps{font-size:.8rem;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tg{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.tg-d{background:var(--dl);color:var(--d)}.tg-w{background:var(--wl);color:var(--w)}.tg-s{background:var(--sl);color:var(--s)}.tg-p{background:var(--pl);color:var(--p)}
.mc{background:var(--c);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.08);padding:16px;margin-bottom:12px;border-left:4px solid var(--b)}
.mc.u{border-left-color:var(--d)}.mc.w{border-left-color:var(--w)}.mc.o{border-left-color:var(--s)}
.mh{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}.mn{font-weight:600;font-size:.92rem}.ms{font-size:.78rem;color:var(--t2)}
.mb{margin-top:8px;font-size:.82rem;color:var(--t2);line-height:1.7}.mb span{margin-right:12px}.mf{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.em{padding:40px 20px;text-align:center;color:var(--t2)}.em .ic{font-size:3rem;margin-bottom:10px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}.mo.s{display:flex}
.mo-b{background:var(--c);border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.15);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.mo-t{font-size:1.1rem;font-weight:600;margin-bottom:16px}.mo-a{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.ts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;font-size:.85rem;z-index:300;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.ts.s{display:block;animation:ti .3s}@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:none;cursor:pointer;z-index:50;box-shadow:0 4px 12px rgba(79,70,229,.4)}
.fab:active{transform:scale(.9)}
.oi{max-width:100%;max-height:260px;border-radius:8px;border:1px solid var(--b)}
.sp{width:36px;height:36px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.ph{margin-top:10px}.px{display:flex;justify-content:space-between;padding:5px 0;font-size:.8rem;border-bottom:1px dashed var(--b)}.px:last-child{border-bottom:none}
@media(max-width:480px){.mw{padding:12px}.st{gap:8px}.st-c{padding:12px 8px}.st-n{font-size:1.4rem}.cd{padding:16px}.fab{width:46px;height:46px;font-size:1.3rem;bottom:14px;right:14px}}</style>
</head>
<body>
<div class="nb"><div class="ni"><div class="lg">🏥 用药管理</div><div class="nv"><button class="nb-b on" onclick="sp('home')">首页</button><button class="nb-b" onclick="sp('patients')">患者</button><button class="nb-b" onclick="sp('settings')">设置</button><button class="nb-b" onclick="om('ocrM')" style="color:var(--p)">📷</button></div></div></div>
<div class="mw">
<div class="pg on" id="ph"><div id="alA"></div><div class="st" id="stA"></div><div class="cd"><div class="cd-t">📋 需取药提醒</div><div id="rmA"></div></div></div>
<div class="pg" id="pp"><div id="ptA"></div></div>
<div class="pg" id="ps"><div class="cd"><div class="cd-t">💾 数据备份</div><div style="display:flex;gap:8px"><button class="btn btn-p btn-sm" onclick="exD()">📤 导出</button><button class="btn btn-sm" onclick="document.getElementById('iF').click()">📥 导入</button><input type="file" id="iF" accept=".json" style="display:none" onchange="imD(event)"></div></div><div class="cd"><div class="cd-t">ℹ️ 关于</div><div style="font-size:.85rem;color:var(--t2);line-height:1.8">慢性病用药管理系统 v2.0<br>数据保存在浏览器本地<br>支持 📷 处方拍照识别</div></div></div>
</div>
<button class="fab" id="fab" onclick="om('ptM')">+</button>
<div class="ts" id="ts"></div>
<div class="mo" id="ptM"><div class="mo-b"><div class="mo-t" id="ptMt">👤 添加患者</div><div class="fg"><label>姓名 *</label><input id="nM" placeholder="患者姓名"></div><div class="fg"><label>电话</label><input id="pM" type="tel" placeholder="选填"></div><div class="fg"><label>备注（诊断、医保等）</label><textarea id="noM" placeholder="如：高血压、职工医保"></textarea></div><input type="hidden" id="ePid"><div class="mo-a"><button class="btn btn-sm" onclick="cm('ptM')">取消</button><button class="btn btn-sm btn-p" onclick="sP()">保存</button></div></div></div>
<div class="mo" id="medM"><div class="mo-b"><div class="mo-t" id="medMt">💊 添加用药</div><div style="margin-bottom:12px;font-size:.85rem;color:var(--t2)" id="medLb"></div><div class="fr"><div class="fg"><label>药品名 *</label><input id="dN" placeholder="如：阿托伐他汀钙片"></div><div class="fg"><label>规格</label><input id="dS" placeholder="如：20mg×7片"></div></div><div class="fr"><div class="fg"><label>总数量 *</label><input id="dQ" type="number" step="0.5" placeholder="如：90"></div><div class="fg"><label>每日用量 *</label><input id="dD" type="number" step="0.5" placeholder="如：1"></div></div><div class="fr"><div class="fg"><label>单位</label><select id="dU"><option value="片">片</option><option value="粒">粒</option><option value="支">支</option><option value="ml">ml</option><option value="包">包</option></select></div><div class="fg"><label>开始日期 *</label><input id="dSd" type="date"></div></div><div class="fg"><label>备注（用法等）</label><textarea id="dNo"></textarea></div><input type="hidden" id="mPid"><input type="hidden" id="eMid"><div class="mo-a"><button class="btn btn-sm" onclick="cm('medM')">取消</button><button class="btn btn-sm btn-p" onclick="sM()">保存</button></div></div></div>
<div class="mo" id="pkM"><div class="mo-b"><div class="mo-t">💊 记录取药</div><div id="pkI" style="font-size:.85rem;color:var(--t2);margin-bottom:12px"></div><div class="fr"><div class="fg"><label>取药数量 *</label><input id="pkQ" type="number" step="0.5"></div><div class="fg"><label>取药日期</label><input id="pkD" type="date"></div></div><div class="fg"><label>备注</label><textarea id="pkNo"></textarea></div><input type="hidden" id="pkMid"><div class="mo-a"><button class="btn btn-sm" onclick="cm('pkM')">取消</button><button class="btn btn-sm btn-p" onclick="sPk()">确认</button></div></div></div>
<div class="mo" id="ocrM"><div class="mo-b"><div class="mo-t">📷 识别处方</div><p style="font-size:.85rem;color:var(--t2);margin-bottom:12px">拍照或上传处方图片，自动提取信息</p><button class="btn btn-p" style="width:100%;justify-content:center" onclick="document.getElementById('ocrF').click()">📤 选择图片/拍照</button><input type="file" id="ocrF" accept="image/*" capture="environment" style="display:none" onchange="sOc(event)"><div id="ocrPg" style="display:none;text-align:center;margin-top:16px"><div class="sp"></div><div id="ocrSt" style="font-size:.85rem;color:var(--t2)">识别中...</div></div><div id="ocrRs" style="display:none;margin-top:16px"><div id="ocrH"></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-sm btn-p" onclick="aOc()">📝 填入表单</button><button class="btn btn-sm" onclick="ocDr()">⚡ 快速创建</button></div></div><div id="ocrEr" style="display:none;margin-top:12px;padding:10px;background:var(--dl);border-radius:8px;font-size:.85rem;color:var(--d)"></div><img id="ocrI" class="oi" style="display:none;margin-top:12px"><div id="ocrPr" style="display:none;margin-top:12px;padding:16px;background:var(--pl);border-radius:8px;font-size:.82rem;color:var(--t2);text-align:center">📷 识别中，请稍候...</div></div></div>
<script>var K='med_data';function ts(){return new Date().toISOString().split('T')[0]}
function es(s){return String(s||'').replace(/[&<>"']/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]})}
function ld(){try{return JSON.parse(localStorage.getItem(K))||{p:[],m:[],r:[]}}catch(e){return{p:[],m:[],r:[]}}}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function gn(){var d=ld();var mx=0;d.p.forEach(function(p){if(p.id>mx)mx=p.id});d.m.forEach(function(m){if(m.id>mx)mx=m.id});d.r.forEach(function(r){if(r.id>mx)mx=r.id});return mx+1}
function fd(m){var s=Math.floor(m.q/m.d);var dt=new Date(m.sd+'T00:00:00');dt.setDate(dt.getDate()+s);var t=new Date();t.setHours(0,0,0,0);var du=Math.ceil((dt.getTime()-t.getTime())/86400000);return{sup:s,next:fm(dt),urg:du<=3,od:du<=0,days:du}}
function fm(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
var tt;function to(s){var t=document.getElementById('ts');t.textContent=s;t.classList.add('s');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('s')},2500)}
function om(i){document.getElementById(i).classList.add('s')}function cm(i){document.getElementById(i).classList.remove('s')}
function sp(n){document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on')});document.getElementById('p'+n).classList.add('on');var b=document.querySelectorAll('.nb-b');b.forEach(function(x){x.classList.remove('on')});var mm={home:0,patients:1,settings:2};if(mm[n]!==undefined)b[mm[n]].classList.add('on');document.getElementById('fab').style.display=n==='settings'?'none':'flex';if(n==='home')lH();if(n==='patients')lP()}
function lH(){var d=ld();var uL=[];d.m.forEach(function(m){var pt=d.p.find(function(p){return p.id==m.pid});var f=fd(m);if(f.days<=3){uL.push({pn:pt?pt.name:'?',pid:m.pid,mid:m.id,dr:m.drug,nx:f.next,dy:f.days,od:f.od})}});uL.sort(function(a,b){return a.dy-b.dy})
document.getElementById('stA').innerHTML='<div class=st-c><div class=st-n>'+d.p.length+'</div><div class=st-l>患者</div></div><div class=st-c><div class=st-n>'+d.m.length+'</div><div class=st-l>用药</div></div><div class=st-c><div class=st-n'+(uL.length?' dg':'')+'>'+uL.length+'</div><div class=st-l>需取药</div></div>'
var al='';var od=uL.filter(function(x){return x.od});if(od.length){al+='<div class="al al-r"><div class=al-i>🔴</div><div><div class=al-t>已过期需取药</div>';od.forEach(function(u){al+='<div class=al-it>· <b>'+es(u.pn)+'</b> — '+es(u.dr)+'（逾期'+Math.abs(u.dy)+'天）</div>'});al+='</div></div>'}
var ud=uL.filter(function(x){return !x.od});if(ud.length){al+='<div class="al al-w"><div class=al-i>🟡</div><div><div class=al-t>3天内需取药</div>';ud.forEach(function(u){al+='<div class=al-it>· <b>'+es(u.pn)+'</b> — '+es(u.dr)+'（剩'+u.dy+'天）</div>'});al+='</div></div>'}document.getElementById('alA').innerHTML=al
var rm=document.getElementById('rmA');if(!uL.length){rm.innerHTML='<div class=em><div class=ic>✅</div>暂无提醒</div>'}else{rm.innerHTML=uL.map(function(u){var cl=u.od?'u':'w';var lb=u.od?'逾期'+Math.abs(u.dy)+'天':'剩'+u.dy+'天';var tg=u.od?'tg-d':'tg-w';return '<div class="mc '+cl+'"><div class=mh><div><div class=mn>'+es(u.pn)+'</div><div class=ms>'+es(u.dr)+'</div></div><span class="tg '+tg+'">'+lb+'</span></div><div class=mb><span>需取药：'+u.nx+'</span></div><div class=mf><button class="btn btn-xs btn-p" onclick="oPk('+u.mid+')">💊 已取药</button><button class="btn btn-xs btn-gh" onclick="sPd('+u.pid+')">查看</button></div></div>'}).join('')}}
function lP(){var d=ld();var dv=document.getElementById('ptA');if(!d.p.length){dv.innerHTML='<div class=cd><div class=em><div class=ic>📋</div>暂无患者</div></div>';return}
dv.innerHTML='';d.p.forEach(function(pt){var ms=d.m.filter(function(m){return m.pid==pt.id});var ug=ms.some(function(m){return fd(m).days<=3});var h='<div class=pi style=border:none;padding-top:0><div class=pa style=background:'+(ug?'var(--dl)':'var(--pl)')+'>'+(ug?'🔴':'👤')+'</div><div class=pf><div class=pn>'+es(pt.name)+' '+(ms.length?'<span class="tg tg-p">'+ms.length+'种</span>':'')+'</div><div class=ps>'+(pt.phone?'📞 '+es(pt.phone):'')+' '+(ms.length?'下次:'+ms.map(function(m){return fd(m).next}).sort()[0]:'暂无用药')+'</div></div><div class=pt><button class="btn btn-xs btn-gh" onclick="sPd('+pt.id+')">详情</button><button class="btn btn-xs btn-gh" onclick="ePt('+pt.id+')">✏️</button><button class="btn btn-xs btn-gh" style=color:var(--d) onclick="dPt('+pt.id+')">🗑️</button></div></div>'
if(ug){h+='<div style=margin-top:10px;padding-top:10px;border-top:1px solid var(--b)>';ms.filter(function(m){return fd(m).days<=3}).forEach(function(m){var f=fd(m);h+='<div style=display:flex;justify-content:space-between;font-size:.82rem;padding:2px 0><span>💊 '+es(m.drug)+'</span><span class="tg '+(f.od?'tg-d':'tg-w')+'">'+(f.od?'逾期':f.days+'天后')+'</span></div>'});h+='</div>'}
h+='<div style=margin-top:10px;padding-top:10px;border-top:1px solid var(--b);display:flex;gap:6px;flex-wrap:wrap><button class="btn btn-xs btn-p" onclick="aM('+pt.id+')">＋ 用药</button><button class="btn btn-xs" onclick="sPd('+pt.id+')">📋 全部</button></div>';var cd=document.createElement('div');cd.className='cd';cd.innerHTML=h;dv.appendChild(cd)})}
function oPt(){document.getElementById('ptMt').textContent='👤 添加患者';document.getElementById('nM').value='';document.getElementById('pM').value='';document.getElementById('noM').value='';document.getElementById('ePid').value='';om('ptM');setTimeout(function(){document.getElementById('nM').focus()},100)}
function ePt(id){var d=ld();var pt=d.p.find(function(p){return p.id==id});if(!pt){to('未找到');return}document.getElementById('ptMt').textContent='✏️ 编辑';document.getElementById('nM').value=pt.name;document.getElementById('pM').value=pt.phone||'';document.getElementById('noM').value=pt.notes||'';document.getElementById('ePid').value=id;om('ptM')}
function sP(){var n=document.getElementById('nM').value.trim();var ph=document.getElementById('pM').value.trim();var no=document.getElementById('noM').value.trim();var id=document.getElementById('ePid').value;if(!n){to('输入姓名');return}var d=ld();if(id){var pt=d.p.find(function(p){return p.id==parseInt(id)});if(pt){pt.name=n;pt.phone=ph;pt.notes=no}to('已更新')}else{d.p.push({id:gn(),name:n,phone:ph,notes:no})}sv(d);cm('ptM');lH();lP()}
function dPt(id){if(!confirm('删除患者和所有用药？'))return;var d=ld();d.p=d.p.filter(function(p){return p.id!=id});d.m=d.m.filter(function(m){return m.pid!=id});d.r=d.r.filter(function(r){return d.m.some(function(m){return m.id==r.mid})});sv(d);to('已删除');lH();lP();if(document.getElementById('pd')){document.getElementById('pd').remove();sp('patients')}}
function sPd(id){var d=ld();var pt=d.p.find(function(p){return p.id==id});if(!pt){to('未找到');return}var od=document.getElementById('pd');if(od)od.remove();var dv=document.createElement('div');dv.className='pg on';dv.id='pd';var h='<div style=display:flex;align-items:center;gap:8px;margin-bottom:16px><button class="btn btn-xs btn-gh" onclick=cPd()>← 返回</button><span style=font-weight:600;font-size:1.1rem>'+es(pt.name)+'</span>'+(pt.phone?'<span style=font-size:.85rem;color:var(--t2)>📞 '+es(pt.phone)+'</span>':'')+'</div>'+(pt.notes?'<div style=font-size:.85rem;padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:12px>📝 '+es(pt.notes)+'</div>':'')+'<div style=display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px><button class="btn btn-sm btn-p" onclick="aM('+pt.id+')">＋ 用药</button><button class="btn btn-sm" onclick="ePt('+pt.id+')">✏️ 编辑</button></div><div id=dM></div>'
dv.innerHTML=h;document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('on')});document.querySelector('.mw').appendChild(dv);var md=document.getElementById('dM');var ms=d.m.filter(function(m){return m.pid==id});if(!ms.length){md.innerHTML='<div class=cd><div class=em><div class=ic>💊</div>暂无用药</div></div>';return}
