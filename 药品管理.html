<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>慢性病用药管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>:root{--primary:#4f46e5;--primary-light:#eef2ff;--danger:#ef4444;--danger-light:#fef2f2;--success:#10b981;--success-light:#ecfdf5;--warning:#f59e0b;--warning-light:#fffbeb;--text:#1e293b;--text-secondary:#64748b;--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.08);--transition:.2s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;padding-bottom:80px}
.navbar{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);background:rgba(255,255,255,.92)}
.navbar-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;padding:0 16px;height:56px;gap:8px}
.logo{font-weight:700;font-size:1.1rem;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--primary),#818cf8);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff}
.nav-tabs{display:flex;gap:2px;margin-left:auto}
.nav-btn{padding:8px 14px;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);white-space:nowrap;transition:.15s}
.nav-btn:hover{background:var(--bg)}
.nav-btn.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.container{max-width:900px;margin:0 auto;padding:16px}
.page{display:none}.page.active{display:block}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;text-align:center}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--primary)}
.stat-num.danger{color:var(--danger)}
.stat-label{font-size:.78rem;color:var(--text-secondary);margin-top:4px}
.alert-banner{background:var(--danger-light);border-left:4px solid var(--danger);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:10px;display:none}
.alert-banner.show{display:flex}
.alert-badge{background:var(--danger);color:#fff;border-radius:20px;padding:3px 12px;font-weight:700;font-size:.85rem;margin-left:auto}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;cursor:pointer;user-select:none}
.card-header h2{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:6px}
.card.collapsed .card-body{display:none}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:.8rem;font-weight:600;color:var(--text-secondary)}
input,select,textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;background:var(--card);transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.12)}
textarea{resize:vertical;min-height:50px}
.form-actions{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;grid-column:1/-1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:8px;font-size:.85rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:.15s;white-space:nowrap;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-xs{padding:4px 10px;font-size:.75rem;border-radius:6px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-secondary)}
.btn-ghost:hover{background:var(--bg)}
.table-wrapper{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.9rem}
th{background:#f8fafc;font-weight:600;text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
td{padding:12px 14px;border-bottom:1px solid #f1f5f9}
tr:last-child td{border-bottom:none}
tr:hover{background:#f8fafc}
tr.urgent{background:var(--danger-light)!important}
.patient-name{font-weight:600}
.next-date{font-weight:700}
.next-date.urgent-date{color:var(--danger);background:var(--danger-light);padding:2px 8px;border-radius:10px;display:inline-block}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.tag-urgent{background:var(--danger-light);color:var(--danger)}
.tag-warning{background:var(--warning-light);color:#b45309}
.tag-normal{background:var(--success-light);color:#065f46}
.tag-info{background:var(--primary-light);color:var(--primary)}
.action-btns{display:flex;gap:4px;flex-wrap:wrap}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:3rem;margin-bottom:10px}
.med-sub{background:#fafafa;border-top:1px solid var(--border)}
.med-sub td{padding:10px 14px 10px 28px}
.med-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px dashed #e2e8f0;font-size:.85rem}
.med-item:last-child{border-bottom:none}
.med-name{font-weight:600;min-width:80px}
.med-info{color:var(--text-secondary);flex:1}
.med-status{flex-shrink:0}
.med-actions{display:flex;gap:4px;flex-shrink:0}
.med-toggle{color:var(--primary);cursor:pointer;font-size:.82rem;font-weight:500;padding:4px 0}
.reminder-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9}
.reminder-item:last-child{border-bottom:none}
.reminder-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.reminder-icon.danger{background:var(--danger-light)}
.reminder-icon.warning{background:var(--warning-light)}
.reminder-body{flex:1;min-width:0}
.reminder-name{font-weight:600;font-size:.92rem}
.reminder-drug{font-size:.8rem;color:var(--text-secondary)}
.reminder-date{font-size:.8rem;color:var(--text-secondary);margin-top:2px}
.reminder-tag{flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:1.05rem;font-weight:600;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal-info{font-size:.85rem;color:var(--text-secondary);margin-bottom:12px;line-height:1.7}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 24px;border-radius:8px;font-size:.85rem;z-index:300;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);backdrop-filter:blur(4px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;font-weight:500}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:none;cursor:pointer;z-index:50;box-shadow:0 4px 12px rgba(79,70,229,.4);transition:.15s}
.fab:active{transform:scale(.9)}
.fab.hide{display:none}
.ocr-preview{max-width:100%;max-height:200px;border-radius:8px;margin-top:10px;display:none}
.col-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){
.navbar-inner{height:50px;padding:0 12px}
.logo{font-size:1rem}
.nav-btn{padding:6px 10px;font-size:.8rem}
.container{padding:12px}
.card{padding:14px}
.stats{gap:8px}
.stat-card{padding:12px 8px}
.stat-num{font-size:1.4rem}
.form-grid{grid-template-columns:1fr}
th,td{padding:8px 10px;font-size:.78rem}
.fab{width:44px;height:44px;font-size:1.3rem;bottom:14px;right:14px}
.modal-box{padding:18px}
.med-item{flex-wrap:wrap}
.col-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <span id="loadingText">处理中...</span>
</div>

<nav class="navbar">
    <div class="navbar-inner">
        <div class="logo"><span class="logo-icon">💊</span> 用药管理</div>
        <div class="nav-tabs">
            <button class="nav-btn active" data-page="home">首页</button>
            <button class="nav-btn" data-page="patients">患者</button>
            <button class="nav-btn" data-page="settings">设置</button>
        </div>
    </div>
</nav>

<div class="container">

<div class="page active" id="pageHome">
    <div class="stats" id="statsContainer"></div>
    <div class="alert-banner" id="alertBanner">
        <span>🚨</span>
        <span id="alertText">有患者需要取药</span>
        <span class="alert-badge" id="alertCount">0</span>
    </div>
    <div class="card">
        <div class="card-header" onclick="this.parentElement.classList.toggle('collapsed')">
            <h2>📋 需取药提醒</h2>
            <span>▼</span>
        </div>
        <div class="card-body" id="reminderList"></div>
    </div>
</div>

<div class="page" id="pagePatients">
    <div class="card" id="formCard">
        <div class="card-header" id="formCardHeader">
            <h2><span id="formIcon">➕</span> <span id="formTitle">添加患者</span></h2>
            <span class="toggle-icon">▼</span>
        </div>
        <div class="card-body">
            <div class="form-grid">
                <div class="form-group"><label>姓名 *</label><input type="text" id="nameInput" placeholder="例如: 张三"></div>
                <div class="form-group"><label>电话</label><input type="tel" id="phoneInput" placeholder="手机号"></div>
                <div class="form-group"><label>医保类型</label>
                    <select id="insuranceInput"><option value="城镇职工">城镇职工</option><option value="城乡居民">城乡居民</option><option value="新农合">新农合</option><option value="自费">自费</option></select>
                </div>
                <div class="form-group"><label>医院</label><input type="text" id="hospitalInput" placeholder="例如: 市第一人民医院"></div>
                <div class="form-group" style="grid-column:1/-1"><label>备注（诊断、用药注意事项等）</label><textarea id="notesInput" placeholder="如：高血压、糖尿病，每日饭后服用"></textarea></div>
                <div class="form-actions">
                    <button class="btn btn-primary" id="addBtn">➕ 添加患者</button>
                    <button class="btn btn-primary" id="updateBtn" style="display:none">💾 更新信息</button>
                    <button class="btn" id="cancelEditBtn" style="display:none">取消编辑</button>
                    <button class="btn" id="ocrBtn">📷 处方识别</button>
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                </div>
            </div>
            <input type="hidden" id="editingId">
            <div id="ocrFeedback" style="margin-top:10px;font-size:.82rem;color:var(--text-secondary)"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h2>📋 患者列表</h2><span class="tag tag-info" id="patientCount">0 人</span></div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>姓名</th><th>医保</th><th>药品数</th><th>最近取药</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="patientTableBody">
                    <tr><td colspan="6"><div class="empty-state"><div class="icon">📥</div>暂无患者数据，点击上方添加</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="page" id="pageSettings">
    <div class="card">
        <div class="card-header"><h2>💾 数据备份</h2></div>
        <div class="card-body">
            <div class="settings-section" style="margin-bottom:16px">
                <h3 style="font-size:.95rem;font-weight:600;margin-bottom:10px">📤 导出数据</h3>
                <p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:10px">将所有数据导出为 JSON 文件</p>
                <button class="btn btn-primary" onclick="exD()">📤 导出备份</button>
            </div>
            <div class="settings-section" style="margin-bottom:16px">
                <h3 style="font-size:.95rem;font-weight:600;margin-bottom:10px">📥 导入数据</h3>
                <p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:10px">从 JSON 备份文件恢复数据</p>
                <button class="btn" onclick="document.getElementById('importInput').click()">📥 导入备份</button>
                <input type="file" id="importInput" accept=".json" style="display:none" onchange="imD(event)">
            </div>
            <div class="settings-section">
                <h3 style="font-size:.95rem;font-weight:600;margin-bottom:10px">ℹ️ 关于</h3>
                <p style="font-size:.85rem;color:var(--text-secondary);line-height:1.8">
                    慢性病用药管理系统 v3.0<br>
                    数据保存在浏览器本地<br>
                    支持多药品管理、自动计算下次取药日期<br>
                    支持 📷 处方拍照识别
                </p>
            </div>
        </div>
    </div>
</div>

</div>

<button class="fab" id="fab" onclick="sw('patients');document.getElementById('formCard').classList.remove('collapsed');document.getElementById('formCard').scrollIntoView({behavior:'smooth'})">+</button>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="medModal">
    <div class="modal-box">
        <div class="modal-title" id="medModalTitle">💊 添加药品</div>
        <div class="modal-info" id="medModalInfo"></div>
        <div class="col-2">
            <div class="form-group"><label>药品名 *</label><input id="medDrug" placeholder="如：阿托伐他汀钙片"></div>
            <div class="form-group"><label>规格</label><input id="medSpec" placeholder="如：20mg×7片"></div>
        </div>
        <div class="col-2">
            <div class="form-group"><label>总数量 *</label><input id="medQty" type="number" step="0.5" placeholder="如：90"></div>
            <div class="form-group"><label>每日用量 *</label><input id="medDaily" type="number" step="0.5" placeholder="如：1"></div>
        </div>
        <div class="col-2">
            <div class="form-group"><label>单位</label>
                <select id="medUnit"><option value="片">片</option><option value="粒">粒</option><option value="支">支</option><option value="ml">ml</option><option value="包">包</option></select>
            </div>
            <div class="form-group"><label>开始日期 *</label><input id="medStartDate" type="date"></div>
        </div>
        <div class="form-group"><label>备注（用法等）</label><textarea id="medNotes" placeholder="如：每日一次，每次一片"></textarea></div>
        <input type="hidden" id="medPid"><input type="hidden" id="medEditingId">
        <div class="modal-actions">
            <button class="btn" onclick="cM('medModal')">取消</button>
            <button class="btn btn-primary" onclick="sM()">保存</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="pickupModal">
    <div class="modal-box">
        <div class="modal-title">💊 记录取药</div>
        <div class="modal-info" id="pickupInfo"></div>
        <div class="col-2">
            <div class="form-group"><label>取药数量 *</label><input id="pickupQty" type="number" step="0.5"></div>
            <div class="form-group"><label>取药日期</label><input id="pickupDate" type="date"></div>
        </div>
        <div class="form-group"><label>备注</label><textarea id="pickupNotes"></textarea></div>
        <input type="hidden" id="pickupMid">
        <div class="modal-actions">
            <button class="btn" onclick="cM('pickupModal')">取消</button>
            <button class="btn btn-primary" onclick="sPK()">确认</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="ocrModal">
    <div class="modal-box">
        <div class="modal-title">📷 识别处方</div>
        <p style="font-size:.85rem;color:var(--text-secondary);margin-bottom:12px">拍照或上传处方图片，自动识别患者和药品信息</p>
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="document.getElementById('ocrFileInput').click()">📤 选择图片/拍照</button>
        <input type="file" id="ocrFileInput" accept="image/*" capture="environment" style="display:none" onchange="hOCR(event)">
        <div class="ocr-result" id="ocrResult" style="display:none">
            <div id="ocrContent" style="font-size:.85rem;line-height:1.8"></div>
            <div style="display:flex;gap:8px;margin-top:12px">
                <button class="btn btn-primary btn-sm" onclick="aOCR()">📝 填入表单</button>
                <button class="btn btn-sm" onclick="qcOCR()">⚡ 快速创建</button>
            </div>
        </div>
        <div id="ocrError" style="display:none;margin-top:12px;padding:10px;background:var(--danger-light);border-radius:8px;font-size:.85rem;color:var(--danger)"></div>
        <img id="ocrPreviewImg" class="ocr-preview">
    </div>
</div>

<script>
const STORAGE_KEY = "med_sys_v3";
function ld(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{p:[],m:[],r:[]}}catch(e){return{p:[],m:[],r:[]}}}
function sv(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function gid(){var d=ld(),mx=0;d.p.forEach(function(x){if(x.id>mx)mx=x.id});d.m.forEach(function(x){if(x.id>mx)mx=x.id});d.r.forEach(function(x){if(x.id>mx)mx=x.id});return mx+1}
function td(){return new Date().toISOString().split("T")[0]}
function es(s){return String(s||"").replace(/[&<>"']/g,function(m){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[m]})}
function cm(m){var d=ld(),pr=d.r.filter(function(r){return r.mid===m.id}),tp=0;pr.forEach(function(r){tp+=r.qty});var cq=m.q+tp;if(m.d<=0)return{qty:cq,daysLeft:999,nextDate:"--",urgent:false,overdue:false};var dl=Math.floor(cq/m.d),sd=new Date(m.sd+"T00:00:00"),nd=new Date(sd);nd.setDate(nd.getDate()+Math.floor(cq/m.d));var nw=new Date();nw.setHours(0,0,0,0);var df=Math.ceil((nd.getTime()-nw.getTime())/86400000);return{qty:cq,daysLeft:dl,nextDate:nd.getFullYear()+"-"+String(nd.getMonth()+1).padStart(2,"0")+"-"+String(nd.getDate()).padStart(2,"0"),urgent:df<=3,overdue:df<=0,diff:df}}
var cp="home";function sw(p){cp=p;document.querySelectorAll(".page").forEach(function(e){e.classList.remove("active")});document.getElementById("page"+p.charAt(0).toUpperCase()+p.slice(1)).classList.add("active");document.querySelectorAll(".nav-btn").forEach(function(e){e.classList.remove("active")});document.querySelector('[data-page="'+p+'"]').classList.add("active");document.getElementById("fab").style.display=p==="settings"?"none":"flex";if(p==="home")rH();if(p==="patients")rP()}
document.querySelectorAll(".nav-btn").forEach(function(b){b.addEventListener("click",function(){sw(b.dataset.page)})});
var tt;function to(m){var e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(tt);tt=setTimeout(function(){e.classList.remove("show")},2500)}
function oM(i){document.getElementById(i).classList.add("show")}function cM(i){document.getElementById(i).classList.remove("show")}
document.querySelectorAll(".modal-overlay").forEach(function(e){e.addEventListener("click",function(ev){if(ev.target===e)e.classList.remove("show")})});

var oD=null;async function hOCR(ev){var f=ev.target.files[0];if(!f)return;ev.target.value="";var pr=document.getElementById("ocrPreviewImg");pr.src=URL.createObjectURL(f);pr.style.display="block";document.getElementById("ocrResult").style.display="none";document.getElementById("ocrError").style.display="none";document.getElementById("loadingOverlay").classList.add("show");document.getElementById("loadingText").textContent="识别中...";try{var res=await Tesseract.recognize(f,"chi_sim",{logger:function(m){if(m.status==="recognizing text"){document.getElementById("loadingText").textContent="识别中... "+Math.round(m.progress*100)+"%"}}});document.getElementById("loadingOverlay").classList.remove("show");oD=pOCR(res.data.text);sOR(oD,res.data.text)}catch(e){document.getElementById("loadingOverlay").classList.remove("show");document.getElementById("ocrError").textContent="❌ 识别失败："+e.message;document.getElementById("ocrError").style.display="block"}}
function pOCR(t){var r={name:"",phone:"",insurance:"",hospital:"",date:"",meds:[]},nm=t.match(/(?:姓名|患者|病人)[:：\s]*([\u4e00-\u9fa5]{2,4})/);if(nm)r.name=nm[1];var hm=t.match(/([\u4e00-\u9fa5]{2,10}(?:人民医院|医院|卫生院|诊所|保健院))/);if(hm)r.hospital=hm[1];var dm=t.match(/(\d{4})[年\-./](\d{1,2})[月\-./]?(\d{1,2})日?/);if(dm)r.date=dm[1]+"-"+String(parseInt(dm[2])).padStart(2,"0")+"-"+String(parseInt(dm[3])).padStart(2,"0");var im=t.match(/(城镇职工|城乡居民|新农合|职工医保|居民医保|医保)/);if(im)r.insurance=im[1];var pm=t.match(/1[3-9]\d{9}/);if(pm)r.phone=pm[0];var ls=t.split("\n");ls.forEach(function(l){l=l.trim();if(!l)return;var mm=l.match(/([\u4e00-\u9fa5]{2,10}(?:片|胶囊|丸|口服液|注射液|滴眼液|贴|膏|散|冲剂))\s*(?:\*|x|X|×)\s*(\d+)/);if(mm){r.meds.push({name:mm[1],spec:"",qty:parseInt(mm[2]),daily:1});return}var dm2=l.match(/^([\u4e00-\u9fa5]{2,10}(?:片|胶囊|丸|口服液))$/);if(dm2){r.meds.push({name:dm2[1],spec:"",qty:30,daily:1})}});return r}
